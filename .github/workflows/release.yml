name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release/tag consistency
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          echo "Tag: $TAG_NAME"
          echo "Prerelease: $IS_PRERELEASE"

          TAG_LOWER=$(echo "$TAG_NAME" | tr '[:upper:]' '[:lower:]')

          if [[ "$TAG_LOWER" =~ (alpha|beta|rc) ]] && [[ "$IS_PRERELEASE" != "true" ]]; then
            echo "::error::The tag '$TAG_NAME' looks like a pre-release tag (alpha/beta/rc), but the release is not marked as a pre-release."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push version tag
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          platforms: linux/amd64,linux/arm64

      - name: Build and push latest
        if: ${{ !github.event.release.prerelease }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64,linux/arm64
